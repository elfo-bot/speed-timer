<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Speed Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
        }
        
        #video-container {
            position: relative;
            width: 100vw;
            height: 70vh;
            overflow: hidden;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        /* Lines */
        .line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 4px;
            opacity: 0.8;
            z-index: 10;
        }
        
        #line1 {
            top: 30%;
            background: #00ff00;
            box-shadow: 0 0 20px #00ff00;
        }
        
        #line2 {
            top: 70%;
            background: #ff0000;
            box-shadow: 0 0 20px #ff0000;
        }
        
        .line-label {
            position: absolute;
            right: 10px;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            z-index: 11;
        }
        
        #label1 {
            top: calc(30% - 24px);
            background: #00ff00;
            color: black;
        }
        
        #label2 {
            top: calc(70% - 24px);
            background: #ff0000;
            color: white;
        }
        
        /* Controls */
        #controls {
            height: 30vh;
            width: 100%;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 15px;
        }
        
        #result {
            font-size: 48px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }
        
        #status {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .btn {
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s;
        }
        
        #startBtn {
            background: #00ff00;
            color: black;
        }
        
        #resetBtn {
            background: #333;
            color: white;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Measurement input */
        #distanceInput {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        #distanceInput input {
            width: 80px;
            padding: 10px;
            font-size: 18px;
            text-align: center;
            border: 2px solid #333;
            border-radius: 8px;
            background: #222;
            color: white;
        }
        
        #distanceInput label {
            color: #888;
            font-size: 14px;
        }
        
        /* Instructions */
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: #aaa;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
        
        <div class="line" id="line1"></div>
        <div class="line" id="line2"></div>
        <div class="line-label" id="label1">START</div>
        <div class="line-label" id="label2">END</div>
        
        <div id="instructions">Point camera at object path</div>
    </div>
    
    <div id="controls">
        <div id="status">Ready</div>
        <div id="result">0.000s</div>
        
        <div id="distanceInput">
            <label>Distance (m):</label>
            <input type="number" id="distance" value="1" step="0.1" min="0.1">
        </div>
        
        <div style="display: flex; gap: 15px;">
            <button class="btn" id="startBtn">Start</button>
            <button class="btn" id="resetBtn">Reset</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resultEl = document.getElementById('result');
        const statusEl = document.getElementById('status');
        const distanceInput = document.getElementById('distance');
        
        let stream = null;
        let isRunning = false;
        let hasPassedLine1 = false;
        let hasPassedLine2 = false;
        let startTime = 0;
        let endTime = 0;
        let animationId = null;
        
        // Line positions (as percentage)
        const LINE1_Y = 0.30;
        const LINE2_Y = 0.70;
        
        // Motion detection threshold
        const MOTION_THRESHOLD = 30;
        
        // Previous frame data for motion detection
        let prevFrame = null;
        
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                video.srcObject = stream;
                await video.play();
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
            } catch (err) {
                alert('Camera access denied. Please allow camera access.');
                console.error(err);
            }
        }
        
        function detectMotion() {
            if (!isRunning) return;
            
            // Draw current frame
            ctx.drawImage(video, 0, 0);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            const line1PixelY = Math.floor(canvas.height * LINE1_Y);
            const line2PixelY = Math.floor(canvas.height * LINE2_Y);
            
            let motionAtLine1 = false;
            let motionAtLine2 = false;
            
            // Check motion at line 1
            let line1Pixels = 0;
            let line1Motion = 0;
            for (let x = 0; x < canvas.width; x++) {
                const i = (line1PixelY * canvas.width + x) * 4;
                const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
                if (prevFrame) {
                    const prevBrightness = (prevFrame[i] + prevFrame[i+1] + prevFrame[i+2]) / 3;
                    if (Math.abs(brightness - prevBrightness) > MOTION_THRESHOLD) {
                        line1Motion++;
                    }
                }
                line1Pixels++;
            }
            motionAtLine1 = line1Motion > line1Pixels * 0.1; // 10% motion threshold
            
            // Check motion at line 2
            let line2Pixels = 0;
            let line2Motion = 0;
            for (let x = 0; x < canvas.width; x++) {
                const i = (line2PixelY * canvas.width + x) * 4;
                const brightness = (data[i] + data[i+1] + data[i+2]) / 3;
                if (prevFrame) {
                    const prevBrightness = (prevFrame[i] + prevFrame[i+1] + prevFrame[i+2]) / 3;
                    if (Math.abs(brightness - prevBrightness) > MOTION_THRESHOLD) {
                        line2Motion++;
                    }
                }
                line2Pixels++;
            }
            motionAtLine2 = line2Motion > line2Pixels * 0.1;
            
            // Store current frame for next comparison
            prevFrame = new Uint8ClampedArray(data);
            
            // Detect crossing
            if (motionAtLine1 && !hasPassedLine1 && !hasPassedLine2) {
                hasPassedLine1 = true;
                startTime = Date.now();
                statusEl.textContent = 'Started!';
                statusEl.style.color = '#00ff00';
                document.getElementById('line1').style.opacity = '1';
            }
            
            if (motionAtLine2 && hasPassedLine1 && !hasPassedLine2) {
                hasPassedLine2 = true;
                endTime = Date.now();
                const elapsed = (endTime - startTime) / 1000;
                const distance = parseFloat(distanceInput.value) || 1;
                const speed = distance / elapsed;
                
                resultEl.textContent = elapsed.toFixed(3) + 's';
                statusEl.textContent = `Speed: ${speed.toFixed(2)} m/s`;
                statusEl.style.color = '#ff0000';
                
                stopDetection();
            }
            
            // Highlight lines when motion detected
            if (motionAtLine1 && !hasPassedLine1) {
                document.getElementById('line1').style.height = '8px';
            } else {
                document.getElementById('line1').style.height = '4px';
            }
            
            if (motionAtLine2 && hasPassedLine1 && !hasPassedLine2) {
                document.getElementById('line2').style.height = '8px';
            } else {
                document.getElementById('line2').style.height = '4px';
            }
            
            if (isRunning) {
                animationId = requestAnimationFrame(detectMotion);
            }
        }
        
        function startDetection() {
            if (!stream) {
                initCamera().then(() => startDetection());
                return;
            }
            
            isRunning = true;
            hasPassedLine1 = false;
            hasPassedLine2 = false;
            startTime = 0;
            endTime = 0;
            prevFrame = null;
            
            resultEl.textContent = '0.000s';
            statusEl.textContent = 'Waiting...';
            statusEl.style.color = '#888';
            
            startBtn.textContent = 'Running...';
            startBtn.disabled = true;
            
            // Small delay to let camera adjust
            setTimeout(() => {
                detectMotion();
            }, 500);
        }
        
        function stopDetection() {
            isRunning = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            startBtn.textContent = 'Start';
            startBtn.disabled = false;
        }
        
        function reset() {
            stopDetection();
            hasPassedLine1 = false;
            hasPassedLine2 = false;
            resultEl.textContent = '0.000s';
            statusEl.textContent = 'Ready';
            statusEl.style.color = '#888';
            prevFrame = null;
            
            document.getElementById('line1').style.opacity = '0.8';
        }
        
        startBtn.addEventListener('click', startDetection);
        resetBtn.addEventListener('click', reset);
        
        // Initialize camera on load
        initCamera();
    </script>
</body>
</html>
