<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Speed Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: white;
        }
        
        #video-container {
            position: relative;
            width: 100vw;
            height: 70vh;
            overflow: hidden;
            background: #111;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        /* Lines */
        .line {
            position: absolute;
            left: 0;
            width: 100%;
            height: 6px;
            z-index: 10;
            transition: height 0.1s;
        }
        
        #line1 {
            top: 30%;
            background: #00ff00;
            box-shadow: 0 0 20px #00ff00, 0 0 40px #00ff00;
        }
        
        #line2 {
            top: 70%;
            background: #ff0000;
            box-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000;
        }
        
        .line-label {
            position: absolute;
            left: 10px;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            z-index: 11;
        }
        
        #label1 {
            top: calc(30% - 32px);
            background: #00ff00;
            color: black;
        }
        
        #label2 {
            top: calc(70% - 32px);
            background: #ff0000;
            color: white;
        }
        
        /* Status indicators */
        .line-triggered {
            height: 12px !important;
        }
        
        /* Controls */
        #controls {
            height: 30vh;
            width: 100%;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            gap: 12px;
        }
        
        #result {
            font-size: 42px;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: #00ff00;
            text-shadow: 0 0 15px #00ff00;
        }
        
        #status {
            font-size: 16px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .btn {
            padding: 14px 36px;
            font-size: 16px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        
        #startBtn {
            background: #00ff00;
            color: black;
            min-width: 140px;
        }
        
        #startBtn.running {
            background: #ffaa00;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        #resetBtn {
            background: #333;
            color: white;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Measurement input */
        #distanceInput {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        #distanceInput input {
            width: 70px;
            padding: 10px;
            font-size: 16px;
            text-align: center;
            border: 2px solid #333;
            border-radius: 8px;
            background: #222;
            color: white;
        }
        
        #distanceInput label {
            color: #888;
            font-size: 14px;
        }
        
        /* Debug info */
        #debug {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 8px;
            border-radius: 4px;
            font-size: 11px;
            font-family: monospace;
            z-index: 100;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div id="video-container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        
        <div class="line" id="line1"></div>
        <div class="line" id="line2"></div>
        <div class="line-label" id="label1">START</div>
        <div class="line-label" id="label2">END</div>
        
        <div id="debug"></div>
    </div>
    
    <div id="controls">
        <div id="status">Tap START then pass object</div>
        <div id="result">0.000s</div>
        
        <div id="distanceInput">
            <label>Distance (m):</label>
            <input type="number" id="distance" value="1" step="0.1" min="0.1">
        </div>
        
        <div style="display: flex; gap: 15px;">
            <button class="btn" id="startBtn">Start</button>
            <button class="btn" id="resetBtn">Reset</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const resultEl = document.getElementById('result');
        const statusEl = document.getElementById('status');
        const distanceInput = document.getElementById('distance');
        const debugEl = document.getElementById('debug');
        
        let stream = null;
        let isRunning = false;
        let hasPassedLine1 = false;
        let hasPassedLine2 = false;
        let startTime = 0;
        let endTime = 0;
        let animationId = null;
        let frameCount = 0;
        
        // Line positions (as percentage)
        const LINE1_Y = 0.30;
        const LINE2_Y = 0.70;
        
        // Motion detection settings
        const MOTION_THRESHOLD = 15; // Lower = more sensitive
        const MOTION_RATIO = 0.05; // 5% of pixels must change
        const COOLDOWN_FRAMES = 10; // Frames to wait before detecting again
        
        let line1Cooldown = 0;
        let line2Cooldown = 0;
        
        // Previous frame data for motion detection
        let prevFrame = null;
        let prevFrameTime = 0;
        
        async function initCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                video.srcObject = stream;
                await video.play();
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                debugEl.textContent = `Camera: ${canvas.width}x${canvas.height}`;
                
            } catch (err) {
                alert('Camera access denied: ' + err.message);
                console.error(err);
            }
        }
        
        function calculateMotion(data, prevData) {
            if (!prevData) return { motion: false, ratio: 0 };
            
            const width = canvas.width;
            const line1Y = Math.floor(canvas.height * LINE1_Y);
            const line2Y = Math.floor(canvas.height * LINE2_Y);
            
            // Sample pixels around each line
            const sampleWidth = Math.floor(width / 4); // Sample every 4th pixel for speed
            const bandHeight = 20; // 20 pixels around each line
            
            let line1Changed = 0;
            let line1Total = 0;
            let line2Changed = 0;
            let line2Total = 0;
            
            for (let x = 0; x < width; x += sampleWidth) {
                // Line 1 band
                for (let y = line1Y - bandHeight/2; y < line1Y + bandHeight/2; y++) {
                    if (y >= 0 && y < canvas.height) {
                        const i = (y * width + x) * 4;
                        const currBright = (data[i] + data[i+1] + data[i+2]) / 3;
                        const prevBright = (prevData[i] + prevData[i+1] + prevData[i+2]) / 3;
                        if (Math.abs(currBright - prevBright) > MOTION_THRESHOLD) {
                            line1Changed++;
                        }
                        line1Total++;
                    }
                }
                
                // Line 2 band
                for (let y = line2Y - bandHeight/2; y < line2Y + bandHeight/2; y++) {
                    if (y >= 0 && y < canvas.height) {
                        const i = (y * width + x) * 4;
                        const currBright = (data[i] + data[i+1] + data[i+2]) / 3;
                        const prevBright = (prevData[i] + prevData[i+1] + prevData[i+2]) / 3;
                        if (Math.abs(currBright - prevBright) > MOTION_THRESHOLD) {
                            line2Changed++;
                        }
                        line2Total++;
                    }
                }
            }
            
            const line1Ratio = line1Total > 0 ? line1Changed / line1Total : 0;
            const line2Ratio = line2Total > 0 ? line2Changed / line2Total : 0;
            
            return {
                motionAtLine1: line1Ratio > MOTION_RATIO,
                motionAtLine2: line2Ratio > MOTION_RATIO,
                line1Ratio: (line1Ratio * 100).toFixed(1),
                line2Ratio: (line2Ratio * 100).toFixed(1)
            };
        }
        
        function detectMotion() {
            if (!isRunning) return;
            
            frameCount++;
            
            // Draw current frame
            ctx.drawImage(video, 0, 0);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            const motion = calculateMotion(data, prevFrame);
            
            // Update debug info
            debugEl.innerHTML = `L1: ${motion.line1Ratio}% | L2: ${motion.line2Ratio}% | Frame: ${frameCount}`;
            
            // Apply cooldowns
            if (line1Cooldown > 0) line1Cooldown--;
            if (line2Cooldown > 0) line2Cooldown--;
            
            // Detect crossing at Line 1 (START)
            if (motion.motionAtLine1 && !hasPassedLine1 && !hasPassedLine2 && line1Cooldown === 0) {
                hasPassedLine1 = true;
                startTime = Date.now();
                line1Cooldown = COOLDOWN_FRAMES;
                
                statusEl.textContent = 'START DETECTED!';
                statusEl.style.color = '#00ff00';
                document.getElementById('line1').classList.add('line-triggered');
                document.getElementById('label1').textContent = '✓ STARTED';
            }
            
            // Detect crossing at Line 2 (END)
            if (motion.motionAtLine2 && hasPassedLine1 && !hasPassedLine2 && line2Cooldown === 0) {
                hasPassedLine2 = true;
                endTime = Date.now();
                line2Cooldown = COOLDOWN_FRAMES;
                
                const elapsed = (endTime - startTime) / 1000;
                const distance = parseFloat(distanceInput.value) || 1;
                const speed = distance / elapsed;
                
                resultEl.textContent = elapsed.toFixed(3) + 's';
                statusEl.textContent = `Speed: ${speed.toFixed(2)} m/s`;
                statusEl.style.color = '#ff0000';
                document.getElementById('line2').classList.add('line-triggered');
                document.getElementById('label2').textContent = '✓ FINISHED';
                
                stopDetection();
            }
            
            // Update line visual feedback
            if (motion.motionAtLine1 && !hasPassedLine1 && line1Cooldown === 0) {
                document.getElementById('line1').style.opacity = '1';
            }
            if (motion.motionAtLine2 && hasPassedLine1 && !hasPassedLine2 && line2Cooldown === 0) {
                document.getElementById('line2').style.opacity = '1';
            }
            
            // Store current frame
            prevFrame = new Uint8ClampedArray(data);
            
            if (isRunning) {
                animationId = requestAnimationFrame(detectMotion);
            }
        }
        
        function startDetection() {
            if (!stream) {
                initCamera().then(() => setTimeout(startDetection, 1000));
                return;
            }
            
            isRunning = true;
            hasPassedLine1 = false;
            hasPassedLine2 = false;
            startTime = 0;
            endTime = 0;
            prevFrame = null;
            frameCount = 0;
            line1Cooldown = 0;
            line2Cooldown = 0;
            
            resultEl.textContent = '0.000s';
            statusEl.textContent = 'Waiting for object...';
            statusEl.style.color = '#888';
            
            document.getElementById('label1').textContent = 'START';
            document.getElementById('label2').textContent = 'END';
            document.getElementById('line1').classList.remove('line-triggered');
            document.getElementById('line2').classList.remove('line-triggered');
            
            startBtn.textContent = 'Running...';
            startBtn.disabled = true;
            startBtn.classList.add('running');
            
            // Wait a moment for camera to stabilize
            setTimeout(() => {
                detectMotion();
            }, 500);
        }
        
        function stopDetection() {
            isRunning = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            startBtn.textContent = 'Start';
            startBtn.disabled = false;
            startBtn.classList.remove('running');
        }
        
        function reset() {
            stopDetection();
            hasPassedLine1 = false;
            hasPassedLine2 = false;
            resultEl.textContent = '0.000s';
            statusEl.textContent = 'Tap START then pass object';
            statusEl.style.color = '#888';
            prevFrame = null;
            frameCount = 0;
            
            document.getElementById('line1').classList.remove('line-triggered');
            document.getElementById('line2').classList.remove('line-triggered');
            document.getElementById('line1').style.opacity = '';
            document.getElementById('line2').style.opacity = '';
            document.getElementById('label1').textContent = 'START';
            document.getElementById('label2').textContent = 'END';
        }
        
        startBtn.addEventListener('click', startDetection);
        resetBtn.addEventListener('click', reset);
        
        // Initialize camera on load
        initCamera();
    </script>
</body>
</html>
